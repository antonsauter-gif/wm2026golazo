<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1C1A17">
  <meta name="apple-mobile-web-app-title" content="Captain League">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%23C8472E'/%3E%3Cpath fill='%23fff' d='M18 13h28v9a14 14 0 0 1-28 0z'/%3E%3Cpath fill='none' stroke='%23fff' stroke-width='4' d='M17 17h-3a7 7 0 0 0 7 8M47 17h3a7 7 0 0 1-7 8'/%3E%3Cpath fill='%23fff' d='M29 33h6v8h-6z'/%3E%3Crect x='21' y='41' width='22' height='6' rx='2' fill='%23fff'/%3E%3C/svg%3E">
<title>Captain League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Saira+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ====================================================================
     CAPTAIN LEAGUE — design system (refined / editorial sport)
     Aesthetic: warm near-black ink · cream paper · single terracotta accent
     Display: Saira Condensed · Body: Hanken Grotesk
     ==================================================================== */
  :root{
    --paper:#F4F2EC; --card:#FFFFFF; --raised:#FFFFFF;
    --ink:#1C1A17; --ink-2:#5C564C; --ink-3:#A39C8E; --muted:#A39C8E;
    --line:#E6E1D7; --line-2:#F0ECE3; --field:#F1EDE4;
    --accent:#C8472E; --accent-press:#A93B24; --accent-wash:#F6E9E3; --accent-ink:#A63A20;
    --good:#2E7D54; --good-wash:#E7F1EB; --bad:#C0392B; --bad-wash:#F6E7E4; --gold:#A07A38;
    --pl-purple:#C8472E;
    --grad-season:linear-gradient(145deg,#AA3820 0%,#1C1410 100%);
    --grad-fant:linear-gradient(145deg,#992F18 0%,#1A1210 100%);
    --grad-holo:linear-gradient(140deg,#2A2620 0%,#201D18 48%,#6E2F1E 165%);
    --f:'Hanken Grotesk',system-ui,-apple-system,Segoe UI,sans-serif;
    --fd:'Saira Condensed','Hanken Grotesk',system-ui,sans-serif;
    --r-xs:7px; --r-sm:10px; --r:13px; --r-lg:17px; --pill:999px;
    --sh:0 1px 2px rgba(28,26,23,.04),0 4px 14px -8px rgba(28,26,23,.13);
    --grad-hero:radial-gradient(130% 150% at 88% -12%, rgba(217,88,52,.52) 0%, rgba(217,88,52,0) 46%), linear-gradient(160deg,#2A211B 0%,#191412 72%);
    --accent-grad:linear-gradient(135deg,#D85633 0%,#B23A1F 100%);
    --warn:#B07B12; --warn-wash:#F4ECDB;
    --sh-up:0 -10px 30px -16px rgba(28,26,23,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);font-family:var(--f);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;height:100%;margin:0;overflow:hidden;overscroll-behavior:none}
  body{display:flex;justify-content:center}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  b,strong{font-weight:700}
  .tnum{font-variant-numeric:tabular-nums}
  .app{width:100%;max-width:452px;height:100vh;height:100dvh;background:var(--paper);position:relative;display:flex;flex-direction:column;overflow:hidden}
  @media(min-width:520px){.app{max-width:none;height:100vh;height:100dvh;max-height:none;margin:0;border:none;border-radius:0;box-shadow:none;overflow:hidden}}

  /* ---------- header ---------- */
  .hd{position:sticky;top:0;z-index:10;background:var(--paper);background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:saturate(1.4) blur(10px);padding:16px 18px 13px;border-bottom:1px solid var(--line);flex-shrink:0}
  .hd-row{display:flex;align-items:center;justify-content:space-between}
  .hd-right{display:flex;align-items:center;gap:8px}
  .hd-pts{display:flex;align-items:center;gap:6px;background:var(--ink);color:#fff;padding:7px 13px;border-radius:var(--pill);font-weight:600;font-size:13px;border:0;cursor:pointer;font-family:inherit}
  .hd-pts .v{font-family:var(--fd);font-weight:700;font-size:17px;letter-spacing:.01em;font-variant-numeric:tabular-nums;line-height:1}
  .pts-ic{width:13px;height:13px;stroke:var(--accent);fill:none;stroke-width:2.4}
  .gear{width:38px;height:38px;border-radius:11px;background:var(--field);display:grid;place-items:center;flex-shrink:0;transition:background .15s}
  .gear svg{width:19px;height:19px;stroke:var(--ink-2);fill:none;stroke-width:1.9}
  .gear:active{background:var(--line)}

  /* brand / wordmark */
  .brand{display:flex;align-items:center;gap:9px}
  .brand .mk{width:30px;height:30px;display:block;flex-shrink:0}
  .brand .wm,.wm{font-family:var(--fd);font-weight:800;font-size:25px;letter-spacing:.01em;color:var(--ink);text-transform:uppercase;line-height:1}
  .hd-logo{height:26px;width:auto;display:block}

  /* ---------- view + section labels ---------- */
  .view{flex:1;min-height:0;overflow-y:auto;overscroll-behavior:contain;padding:18px 16px 26px;-webkit-overflow-scrolling:touch}
  .view::-webkit-scrollbar{width:0}
  .view-title{font-family:var(--fd);font-weight:700;font-size:30px;letter-spacing:.005em;text-transform:uppercase;margin:2px 1px 17px;line-height:.95}
  .lbl{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:.04em;color:var(--ink-3);margin:6px 2px 11px;text-transform:uppercase}
  .note{font-size:12.5px;color:var(--ink-3);line-height:1.55;margin-top:8px}

  /* ---------- buttons ---------- */
  .btn{border-radius:var(--r);padding:13px 16px;font-weight:600;font-size:15px;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,background .15s,opacity .15s;border:1.5px solid transparent;line-height:1}
  .btn:active{transform:scale(.985)}
  .btn svg{width:17px;height:17px;fill:none;stroke-width:2.1}
  .btn-pri{background:var(--accent);color:#fff}.btn-pri:active{background:var(--accent-press)}.btn-pri svg{stroke:#fff}
  .btn-dark{background:var(--ink);color:#fff}.btn-dark svg{stroke:#fff}
  .btn-soft{background:var(--field);color:var(--ink)}.btn-soft svg{stroke:var(--ink)}
  .btn-out{background:var(--card);border-color:var(--line);color:var(--ink)}.btn-out svg{stroke:var(--ink)}
  .btn-sm{padding:11px 15px;font-size:13.5px;flex:0 0 auto;border-radius:var(--r-sm)}
  .btn-wide{width:100%;flex:0 0 auto}
  .btn[disabled]{opacity:.4;pointer-events:none}

  /* ---------- dark hero card (points / standings) ---------- */
  .cd{background:var(--ink);color:#fff;border-radius:var(--r-lg);padding:20px;margin-bottom:16px;position:relative;overflow:hidden;animation:rise .4s ease both}
  .cd::after{content:"";position:absolute;left:0;top:0;width:4px;height:100%;background:var(--accent)}
  .cd .dh-k,.cd .k{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.62)}
  .cd .big{font-family:var(--fd);font-size:40px;font-weight:700;letter-spacing:.01em;margin:4px 0 15px;line-height:.95;font-variant-numeric:tabular-nums}
  .cd-grid{display:flex;gap:8px}
  .cd-cell{flex:1;background:rgba(255,255,255,.09);border-radius:var(--r-sm);padding:11px 0;text-align:center}
  .cd-cell .n{font-family:var(--fd);font-size:27px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .cd-cell .l{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:5px}

  /* ---------- stat tiles ---------- */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 12px;animation:rise .4s ease both}
  .tile .n{font-family:var(--fd);font-size:30px;font-weight:700;letter-spacing:.01em;line-height:1;font-variant-numeric:tabular-nums}
  .tile .n.acc{color:var(--accent)}.tile .n.good{color:var(--good)}
  .tile .l{font-size:11px;color:var(--ink-3);margin-top:7px;font-weight:500}

  /* ---------- Heute: editorial day header + nav ---------- */
  .day-hero{padding:4px 2px 16px;margin-bottom:8px;border-bottom:1px solid var(--line)}
  .dh-k{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--accent)}
  .day-hero.pre .dh-k{color:var(--accent)}
  .dh-big{font-family:var(--fd);font-size:33px;font-weight:700;letter-spacing:.005em;text-transform:uppercase;margin:3px 0 4px;line-height:.95}
  .dh-sub{font-size:13px;color:var(--ink-2);font-weight:500}
  .day-nav{display:flex;align-items:center;gap:10px;margin:14px 0 16px}
  .dn-btn{width:42px;height:42px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--line);display:grid;place-items:center;flex-shrink:0;transition:background .15s}
  .dn-btn svg{width:19px;height:19px;stroke:var(--ink);fill:none;stroke-width:2.2}
  .dn-btn:active{background:var(--field)}
  .dn-btn:disabled{opacity:.3}
  .dn-label{flex:1;text-align:center;font-family:var(--fd);font-weight:600;font-size:16px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-2)}
  .done-banner{display:flex;align-items:center;gap:9px;background:var(--good-wash);color:var(--good);border-radius:var(--r);padding:13px 15px;font-weight:600;font-size:13.5px;margin:2px 0 14px}
  .done-banner svg{width:18px;height:18px;stroke:var(--good);fill:none;stroke-width:2.4;flex-shrink:0}

  /* ---------- match card ---------- */
  .match{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:11px;box-shadow:var(--sh);animation:rise .35s ease both}
  .m-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
  .m-grp{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
  .m-badge{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:var(--pill);letter-spacing:.01em}
  .m-badge.open{background:var(--field);color:var(--ink-2)}
  .m-badge.tipped{background:var(--good-wash);color:var(--good)}
  .m-badge.result{background:var(--ink);color:#fff}
  .m-badge.live{background:var(--accent-wash);color:var(--accent-ink)}
  .m-meta{font-size:11.5px;color:var(--ink-3);margin:0 0 13px;font-weight:500}
  .m-row{display:flex;align-items:center;gap:10px}
  .m-side{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
  .m-side.r{flex-direction:row-reverse;text-align:right}
  .m-fl{flex-shrink:0}
  .m-fl .flag{width:30px;height:21px;border-radius:4px}
  .m-nm{font-weight:700;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .m-in{display:flex;align-items:center;gap:7px;flex-shrink:0}
  .si{width:42px;height:48px;text-align:center;font-family:var(--fd);font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;background:var(--field);border:1.5px solid var(--line);border-radius:var(--r-sm);color:var(--ink);outline:none;transition:.15s}
  .si:focus{border-color:var(--accent);background:var(--card)}
  .si:disabled{opacity:1;color:var(--ink);background:var(--field)}
  .si.hit{border-color:var(--good);background:var(--good-wash);color:var(--good)}
  .m-x{font-family:var(--fd);font-weight:600;color:var(--ink-3);font-size:18px}
  .m-ft{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:13px;border-top:1px solid var(--line-2)}
  .m-fin{font-size:12.5px;color:var(--ink-2);font-weight:500}
  .m-fin b{color:var(--ink);font-weight:700;font-size:14px}
  .m-pt{font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.02em;padding:4px 11px;border-radius:var(--pill)}
  .m-pt.p5{background:var(--good);color:#fff}
  .m-pt.p2{background:var(--good-wash);color:var(--good)}
  .m-pt.p0{background:var(--field);color:var(--ink-3)}

  /* ---------- star control on match card ---------- */
  .m-star{width:100%;display:flex;align-items:center;gap:9px;margin-top:12px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--field);color:var(--ink-2);font-weight:600;font-size:13px;text-align:left;transition:background .15s}
  .m-star:active{background:var(--line-2)}
  .m-star.set{border-color:var(--accent-wash);background:var(--accent-wash)}
  .m-star .ms-ic{display:inline-flex}
  .m-star .ms-ic svg{width:16px;height:16px;fill:none;stroke:var(--accent);stroke-width:2}
  .ms-fl{width:22px;height:15px;border-radius:3px;overflow:hidden;display:inline-flex;flex-shrink:0}
  .ms-fl .flag{width:100%;height:100%;object-fit:cover;border-radius:3px}
  .ms-n{font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ms-pos{font-family:var(--fd);font-size:11px;font-weight:600;color:var(--accent-ink);background:#fff;border-radius:5px;padding:2px 6px;letter-spacing:.03em;flex-shrink:0}
  .ms-add{color:var(--accent-ink);font-weight:700}
  .m-star:not(.set) .ms-add{margin-right:auto}
  .ms-tag{margin-left:auto;font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--accent-ink)}
  .ms-pts{margin-left:auto;font-family:var(--fd);font-size:15px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:2px 10px;font-variant-numeric:tabular-nums}
  .ms-chev{display:inline-flex;flex-shrink:0}
  .ms-chev svg{width:15px;height:15px;stroke:var(--ink-3);fill:none;stroke-width:2}
  .m-star.locked{opacity:.92}

  /* ---------- Captains tab ---------- */
  .trio-explain{background:var(--card);border:1px solid var(--line);color:var(--ink-2);border-radius:var(--r);padding:14px 15px;font-size:13px;line-height:1.55;margin-bottom:12px}
  .trio-explain b{font-weight:700;color:var(--ink)}
  .sp-md{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:20px 2px 11px}
  .sp-row{width:100%;display:flex;flex-direction:column;gap:10px;padding:14px;border:1px solid var(--line);border-radius:var(--r);background:var(--card);margin-bottom:10px;text-align:left;box-shadow:var(--sh)}
  .sp-row:active{background:var(--field)}
  .sp-match{display:flex;flex-direction:column;gap:3px}
  .sp-teams{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .sp-teams .flag{width:20px;height:14px;border-radius:3px}
  .sp-vs{color:var(--ink-3)}
  .sp-res{margin-left:4px;font-family:var(--fd);font-weight:700;color:#fff;background:var(--ink);border-radius:6px;padding:1px 8px;font-size:13px;letter-spacing:.02em}
  .sp-ko{font-size:11.5px;color:var(--ink-3);font-weight:500}
  .sp-star{display:flex;align-items:center;gap:10px;padding-top:11px;border-top:1px solid var(--line-2)}
  .sp-star .ppl-fl{width:26px;height:18px;border-radius:3px;overflow:hidden;flex-shrink:0}
  .sp-star .ppl-fl .flag{width:100%;height:100%;object-fit:cover;border-radius:3px}
  .sp-si{flex:1;min-width:0}
  .sp-sn{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sp-sm{font-size:11.5px;color:var(--ink-3)}
  .sp-pts{font-family:var(--fd);font-size:16px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:3px 11px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .sp-eval{font-size:12.5px;font-weight:700;color:var(--accent-ink);flex-shrink:0}
  .sp-wait{font-size:12px;font-weight:600;color:var(--ink-3);flex-shrink:0}
  .sp-empty{font-size:12px;color:var(--ink-3);padding:4px 2px 12px}

  /* empty state */
  .empty{text-align:center;padding:46px 24px;color:var(--ink-3)}
  .empty-ic{display:grid;place-items:center;margin:0 auto 15px;width:58px;height:58px;border-radius:var(--r-lg);background:var(--accent-wash)}
  .empty-ic svg{width:27px;height:27px;fill:none;stroke:var(--accent);stroke-width:1.8}
  .empty h3{font-family:var(--fd);font-weight:700;font-size:21px;letter-spacing:.01em;text-transform:uppercase;color:var(--ink);margin-bottom:7px}
  .empty p{font-size:14px;line-height:1.55;max-width:280px;margin:0 auto}

  /* ---------- player picker ---------- */
  .sel-sub{display:flex;align-items:center;gap:8px;font-family:var(--fd);font-size:15px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;margin:18px 2px 10px}
  .sel-sub .flag{width:22px;height:15px;border-radius:3px}
  .ppl{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;transition:transform .1s,border-color .15s,background .15s}
  .ppl:active{transform:scale(.99)}
  .ppl.sel{border-color:var(--accent);background:var(--accent-wash)}
  .ppl.dis{opacity:.42}
  .ppl-fl{flex-shrink:0}
  .ppl-fl .flag{width:26px;height:18px;border-radius:3px}
  .ppl-i{flex:1;min-width:0}
  .ppl-n{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ppl-m{font-size:11.5px;color:var(--ink-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ppl-add{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:21px;font-weight:400;flex-shrink:0;line-height:1}
  .ppl-add.in{background:var(--good)}
  .ppl-add.in svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.6}
  .seg-pos{display:flex;gap:7px;margin-bottom:13px}
  .seg-pos button{flex:1;padding:10px 4px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--line);font-family:var(--fd);font-weight:600;font-size:14px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-2);transition:.12s}
  .seg-pos button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ---------- star eval sheet ---------- */
  .ev-match{text-align:center;font-weight:700;font-size:15px;padding:13px;background:var(--field);border-radius:var(--r);margin-bottom:2px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .ev-match .flag{width:24px;height:16px;border-radius:3px}
  .ev-match b{font-family:var(--fd);color:var(--ink);font-size:20px;letter-spacing:.02em;font-variant-numeric:tabular-nums}
  .ev-match .ev-vs{color:var(--ink-3);font-weight:600}
  .ev-lbl{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:17px 2px 9px}
  .seg-min{display:flex;gap:7px;margin-bottom:6px}
  .seg-min button{flex:1;padding:12px 6px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--card);font-weight:600;font-size:12px;line-height:1.2;color:var(--ink-2)}
  .seg-min button.on{border-color:var(--accent);background:var(--accent);color:#fff}
  .evd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:var(--field);border-radius:var(--r-sm);margin-bottom:7px;font-size:13.5px;color:var(--ink-2)}
  .evd em{font-style:normal;color:var(--ink-3);font-size:11.5px}
  .evd b{font-family:var(--fd);font-size:17px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .ev-total{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:14px 16px;border-radius:var(--r);background:var(--ink);color:#fff;font-weight:600;font-size:14px}
  .ev-total b{font-family:var(--fd);font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.01em}

  /* ---------- Gruppen ---------- */
  .grp-nav{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
  .grp-nav::-webkit-scrollbar{display:none}
  .grp-pill{flex:0 0 auto;width:40px;height:40px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--card);font-family:var(--fd);font-weight:700;font-size:18px;color:var(--ink-2);transition:.12s}
  .grp-pill.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .grp-h{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 11px}
  .grp-h>span:first-child{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:.01em;text-transform:uppercase}
  .grp-sub{font-size:11.5px;font-weight:600;color:var(--ink-3)}
  .gtbl{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--card);margin-bottom:8px;box-shadow:var(--sh)}
  .gt-h,.gt-r{display:grid;grid-template-columns:26px 1fr 30px 44px 38px;align-items:center;gap:4px;padding:10px 12px}
  .gt-h{background:var(--field);font-family:var(--fd);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3)}
  .gt-r{border-top:1px solid var(--line-2);font-size:14px;font-weight:600}
  .gt-r.q{background:var(--accent-wash)}
  .gt-pos{font-family:var(--fd);text-align:center;color:var(--ink-3);font-weight:700;font-size:15px}
  .gt-r.q .gt-pos{color:var(--accent-ink)}
  .gt-tm{display:flex;align-items:center;gap:9px;min-width:0}
  .gt-fl{flex-shrink:0}
  .gt-fl .flag{width:24px;height:16px;border-radius:3px}
  .gt-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
  .gt-c{text-align:center;color:var(--ink-2);font-variant-numeric:tabular-nums;font-size:13.5px}
  .gt-pt{font-family:var(--fd);font-weight:700;color:var(--ink);font-size:16px;text-align:center;font-variant-numeric:tabular-nums}
  .gt-leg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-3);margin:0 2px 6px;line-height:1.35}
  .gt-qd{width:11px;height:11px;border-radius:3px;background:var(--accent-wash);border:1px solid var(--accent);flex-shrink:0}
  .adm-note{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-2);background:var(--field);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;margin-bottom:11px;line-height:1.45}
  .adm-note svg{width:15px;height:15px;stroke:var(--ink-3);fill:none;stroke-width:2;flex-shrink:0}
  .gm-row{width:100%;display:flex;flex-direction:column;gap:8px;padding:13px 14px;border:1px solid var(--line);border-radius:var(--r);background:var(--card);margin-bottom:9px;text-align:left;box-shadow:var(--sh)}
  .gm-row.tap:active{background:var(--field)}
  .gm-when{font-size:11px;color:var(--ink-3);font-weight:500}
  .gm-line{display:flex;align-items:center;gap:9px}
  .gm-side{flex:1;display:flex;align-items:center;gap:8px;min-width:0;font-weight:700;font-size:14px}
  .gm-side.r{justify-content:flex-end;text-align:right}
  .gm-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gm-fl{flex-shrink:0}
  .gm-fl .flag{width:24px;height:16px;border-radius:3px}
  .gm-mid{flex-shrink:0}
  .gm-res{font-family:var(--fd);font-weight:700;font-size:18px;color:var(--ink);background:var(--field);border-radius:7px;padding:3px 11px;letter-spacing:.02em;font-variant-numeric:tabular-nums}
  .gm-row.done .gm-res{background:var(--ink);color:#fff}
  .gm-enter{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:#fff;background:var(--accent);border-radius:7px;padding:5px 11px}
  .gm-vs{font-family:var(--fd);color:var(--ink-3);font-weight:700;font-size:17px}

  /* result entry */
  .res-row{display:flex;align-items:center;gap:10px;margin:6px 0 8px}
  .res-tm{flex:1;display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;min-width:0}
  .res-tm.r{justify-content:flex-end;text-align:right}
  .res-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .res-fl{flex-shrink:0}
  .res-fl .flag{width:28px;height:19px;border-radius:3px}
  .res-in{display:flex;align-items:center;gap:7px;flex-shrink:0}

  /* ---------- Rangliste ---------- */
  .invite{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;box-shadow:var(--sh)}
  .inv-k{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
  .inv-code{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.14em;margin-top:2px;color:var(--ink)}
  .invite .btn-dark{flex:0 0 auto}
  .invite-hint{display:flex;align-items:flex-start;gap:11px;background:var(--field);border:1px dashed var(--line);border-radius:var(--r);padding:14px 15px;margin-top:12px;font-size:13px;color:var(--ink-2);line-height:1.55}
  .invite-hint svg{width:18px;height:18px;fill:none;stroke:var(--ink-3);stroke-width:2;flex-shrink:0;margin-top:1px}
  .invite-hint b{color:var(--ink);font-weight:700}
  .lb{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;box-shadow:var(--sh);animation:rise .35s ease both}
  .lb.me{border-color:var(--accent);border-width:1.5px}
  .lb-r{font-family:var(--fd);font-size:19px;font-weight:700;width:24px;text-align:center;color:var(--ink-3);flex-shrink:0;font-variant-numeric:tabular-nums}
  .lb-av{width:38px;height:38px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--fd);font-weight:700;font-size:17px;flex-shrink:0}
  .lb.me .lb-av{background:var(--accent)}
  .lb-n{flex:1;min-width:0}
  .lb-n .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-s{font-size:11.5px;color:var(--ink-3);margin-top:1px}
  .lb-p{text-align:right;flex-shrink:0}
  .lb-pn{font-family:var(--fd);font-size:21px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .lb-pu{font-size:10px;color:var(--ink-3);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.03em}

  /* ---------- standings strip (Heute → Rangliste) ---------- */
  .stand-strip{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--accent);color:#fff;border-radius:var(--r);padding:15px 17px;margin-top:4px}
  .ss-k{font-family:var(--fd);font-size:12px;font-weight:600;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.05em}
  .ss-v{font-family:var(--fd);font-size:20px;font-weight:700;margin-top:2px;letter-spacing:.01em}
  .ss-arrow{font-size:18px;font-weight:700;color:rgba(255,255,255,.8)}

  /* ---------- settings ---------- */
  .set-sec{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:22px 2px 11px}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:9px}
  .set-l{font-weight:600;font-size:14.5px}
  .set-info{display:flex;align-items:flex-start;gap:11px;background:var(--field);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;margin-bottom:10px;font-size:13px;color:var(--ink-2);line-height:1.55}
  .set-info svg{width:18px;height:18px;stroke:var(--ink-3);fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}
  .set-info b{color:var(--ink);font-weight:700}
  .set-link{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 15px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:9px;font-weight:600;font-size:14.5px;color:var(--ink)}
  .set-link svg{width:18px;height:18px;stroke:var(--ink-3);fill:none;stroke-width:2}
  .set-link.danger{color:var(--bad)}.set-link.danger svg{stroke:var(--bad)}
  .toggle{width:46px;height:27px;border-radius:var(--pill);background:var(--line);position:relative;transition:.15s;flex-shrink:0}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .toggle.on{background:var(--accent)}
  .toggle.on::after{left:22px}

  /* legal + how-it-works */
  .legal h4{font-family:var(--fd);font-size:16px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;margin:18px 0 6px;color:var(--ink)}
  .legal h4:first-child{margin-top:2px}
  .legal p{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:4px}
  .legal .legal-date{font-size:12px;color:var(--ink-3);margin:14px 0 2px}
  .hiw{display:flex;flex-direction:column;gap:7px;margin:8px 0 4px}
  .hiw-row{display:flex;align-items:center;gap:12px;padding:10px 13px;background:var(--field);border:1px solid var(--line);border-radius:var(--r-sm)}
  .hiw-row b{flex-shrink:0;min-width:38px;text-align:center;font-family:var(--fd);font-size:16px;font-weight:700;color:var(--accent-ink);background:var(--accent-wash);border-radius:7px;padding:3px 0;font-variant-numeric:tabular-nums}
  .hiw-row span{font-size:12.5px;color:var(--ink-2);line-height:1.45}

  /* ---------- bottom nav ---------- */
  .tabs{flex-shrink:0;z-index:20;display:flex;background:var(--card);border-top:1px solid var(--line);padding:9px 6px calc(9px + env(safe-area-inset-bottom))}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 0;color:var(--ink-3);transition:color .15s}
  .tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2}
  .tab span{font-weight:600;font-size:10px;letter-spacing:.02em}
  .tab.on{color:var(--accent)}
  .tab.on span{font-weight:700}

  /* ---------- sheet / scrim / toast ---------- */
  .scrim{position:absolute;inset:0;background:rgba(23,20,15,.42);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:51;background:var(--paper);border-radius:24px 24px 0 0;max-height:90%;overflow-y:auto;overscroll-behavior:contain;transform:translateY(102%);transition:transform .3s cubic-bezier(.2,.8,.2,1);box-shadow:var(--sh-up)}
  .sheet.open{transform:none}
  .grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:11px auto 4px}
  .sheet-hd{position:sticky;top:0;background:var(--paper);padding:6px 20px 13px;border-bottom:1px solid var(--line);z-index:2}
  .sheet h2{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.01em;text-transform:uppercase;margin:4px 0 3px;line-height:1}
  .sheet .ss{font-size:13px;color:var(--ink-2);line-height:1.45}
  .sheet-bd{padding:15px 20px 26px}

  /* ---------- fields ---------- */
  .field{margin-bottom:13px}
  .field label{display:block;font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-2);margin-bottom:7px}
  .field input,.field select{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;color:var(--ink);font-weight:500;outline:none;transition:.15s}
  .field input:focus,.field select:focus{border-color:var(--accent)}

  /* ---------- onboarding ---------- */
  .ob,.ob-step{height:100%;overflow-y:auto}
  .ob-step{padding:24px;display:flex;flex-direction:column;min-height:100%}
  .ob-step.auth{max-width:420px;margin:0 auto}
  .ob-back{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--ink-2);margin-bottom:22px;align-self:flex-start}
  .ob-back svg{width:18px;height:18px;stroke:var(--ink-2);fill:none;stroke-width:2}
  .ob-step h2{font-family:var(--fd);font-size:34px;font-weight:700;letter-spacing:.01em;text-transform:uppercase;line-height:.98;margin-bottom:9px}
  .ob-step .sub,.sub{font-size:14.5px;color:var(--ink-2);line-height:1.55;margin-bottom:24px}
  .ob-spacer{flex:1}
  .ob-mini{text-align:center;font-size:12px;color:var(--ink-3);margin-top:16px;line-height:1.5}
  .ob-top{background:var(--ink);color:#fff;padding:36px 26px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden}
  .ob-top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:5px;background:var(--accent)}
  .ob-mark{width:64px;height:64px;margin-bottom:16px}
  .ob-logo-img{width:200px;max-width:72%;height:auto;display:block;margin:22px auto 16px}
  .ob-mark .mk{width:100%;height:100%}
  .ob-wm{font-family:var(--fd);font-weight:800;font-size:40px;letter-spacing:.01em;text-transform:uppercase;line-height:.92}
  .ob-tag{font-family:var(--fd);font-size:14px;font-weight:600;color:rgba(255,255,255,.62);margin-top:8px;letter-spacing:.08em;text-transform:uppercase}
  .ob-body{flex:1;padding:30px 26px calc(26px + env(safe-area-inset-bottom));display:flex;flex-direction:column}
  .ob-body h1{font-family:var(--fd);font-size:30px;font-weight:700;letter-spacing:.01em;text-transform:uppercase;margin-bottom:11px;line-height:1}
  .ob-body p{font-size:15px;color:var(--ink-2);line-height:1.6}
  .ob-actions{margin-top:auto;padding-top:28px}
  .ob-actions .btn{margin-bottom:10px}
  .ob-region{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-2);background:var(--field);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;margin-top:2px}
  .ob-region svg{width:16px;height:16px;stroke:var(--ink-3);fill:none;stroke-width:2;flex-shrink:0}
  .ob-region b{color:var(--ink);font-weight:700}
  .codecard{background:var(--ink);color:#fff;border-radius:var(--r-lg);padding:26px;text-align:center;margin-bottom:18px;position:relative;overflow:hidden}
  .codecard::after{content:"";position:absolute;left:0;top:0;width:100%;height:4px;background:var(--accent)}
  .codecard .k{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6)}
  .codecard .code{font-family:var(--fd);font-size:46px;font-weight:700;letter-spacing:.16em;margin:8px 0 6px}
  .codecard .hint{font-size:13px;color:rgba(255,255,255,.72);line-height:1.55}

  /* auth */
  .auth-err{display:none;color:var(--bad);font-size:13px;margin:2px 2px 12px;font-weight:600;line-height:1.45}
  .auth-switch{text-align:center;margin-top:18px;font-size:13.5px;color:var(--ink-3)}
  .auth-switch button{color:var(--accent-ink);font-weight:700}

  /* ---------- flags, fx, misc ---------- */
  .flag{width:1.42em;height:1.04em;border-radius:3px;object-fit:cover;display:inline-block;vertical-align:middle;box-shadow:0 0 0 1px rgba(23,20,15,.06)}
  .flag.fb{display:inline-grid;place-items:center;background:var(--field);color:var(--ink-2);font-size:.5em;font-weight:700;box-shadow:none}
  .center-wrap{flex:1;display:flex;align-items:center;justify-content:center}
  .toast{position:absolute;left:50%;bottom:112px;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;font-weight:600;font-size:13.5px;padding:12px 18px;border-radius:var(--r);z-index:95;opacity:0;transition:.25s;pointer-events:none;max-width:84%;text-align:center;box-shadow:var(--sh)}
  .toast.show{opacity:1;transform:translateX(-50%)}
  .fx{position:absolute;inset:0;pointer-events:none;z-index:70;overflow:hidden}
  .fx-b{position:absolute;border-radius:2px}
  .diag{background:#1d1a16;color:#EDE7DC;border-radius:var(--r);padding:13px 15px;margin-bottom:16px;font-size:12.5px;line-height:1.7;font-variant-numeric:tabular-nums}
  .diag-h{font-family:var(--fd);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:12px;color:#A39B8E;margin-bottom:6px}
  .diag b{color:#fff;font-weight:700}
  .diag-err{margin-top:7px;color:#FF9B7A;font-weight:600;word-break:break-word}
  .diag-ok{margin-top:7px;color:#5BD08A;font-weight:600}
  .diag .btn-soft{background:#2a2620;color:#EDE7DC;margin-top:9px}
  .lbl-row{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 11px}
  .lb[onclick]{cursor:pointer}
  .lb[onclick]:active{background:var(--field)}
  .lb.lead .lb-av{background:var(--accent)}
  .lb-chev{display:inline-flex;flex-shrink:0;margin-left:-2px}
  .lb-chev svg{width:17px;height:17px;stroke:var(--ink-3);fill:none;stroke-width:2}
  .lb-refresh{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--accent-ink);background:none;padding:4px}
  .lb-refresh svg{width:14px;height:14px;stroke:var(--accent-ink);fill:none;stroke-width:2.2}
  .mb-tot{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:4px 0 8px}
  .mb-tot .t{background:var(--field);border-radius:var(--r-sm);padding:13px 8px;text-align:center}
  .mb-tot .t .n{font-family:var(--fd);font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .mb-tot .t .n.acc{color:var(--accent)}
  .mb-tot .t .l{font-size:10.5px;color:var(--ink-3);margin-top:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .mb-sec{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:18px 2px 10px}
  .mb-row{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:7px}
  .mb-mt{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;min-width:0;flex-wrap:wrap}
  .mb-mt .flag{width:20px;height:14px;border-radius:3px}
  .mb-sc{font-family:var(--fd);font-weight:700;background:var(--field);border-radius:6px;padding:1px 8px;font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .mb-live{font-size:11px;font-weight:700;color:var(--accent-ink);flex-shrink:0}
  .mb-note{font-size:12px;color:var(--ink-2);background:var(--field);border:1px dashed var(--line);border-radius:var(--r-sm);padding:11px 13px;margin-top:6px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
  .mb-note svg{width:15px;height:15px;stroke:var(--ink-3);fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}
  .mb-star{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:7px}
  .mb-star .flag{width:22px;height:15px;border-radius:3px;flex-shrink:0}
  .mb-star .nm{flex:1;min-width:0;font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mb-star .pt{font-family:var(--fd);font-weight:700;color:#fff;background:var(--accent);border-radius:6px;padding:2px 9px;font-size:13px;flex-shrink:0;font-variant-numeric:tabular-nums}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ====================================================================
     LEGACY-SCHICHT (konsolidiert durch CAPTAIN LEAGUE 2.0 am Dateiende)
     deep purple ink · magenta accent · iridescent gradient headers
     ==================================================================== */

  /* PL uses Title case for headings, not ALL CAPS */
  .view-title,.dh-big,.dh-k,.lbl,.note,.cd .k,.cd .dh-k,.sheet h2,.sheet .ss,
  .ob-step h2,.ob-body h1,.ob-wm,.ob-tag,.brand .wm,.wm,.empty h3,.grp-h>span:first-child,
  .grp-sub,.sp-md,.sel-sub,.set-sec,.mb-sec,.legal h4,.field label,.gt-h,.dn-label,
  .m-grp,.ev-lbl,.ev-match b,.codecard .k,.inv-k,.ss-k,.cd-cell .l,.tile .l,
  .lb-pu,.set-sec,.hiw-row b,.gt-leg{ text-transform:none; }

  /* tighter, geometric headings */
  .view-title{ font-weight:800; letter-spacing:-.015em; line-height:1.04; }
  .dh-big{ letter-spacing:-.015em; }
  .grp-h>span:first-child,.sheet h2,.ob-step h2,.empty h3{ letter-spacing:-.01em; }
  .lbl{ letter-spacing:0; font-weight:700; color:var(--ink); font-size:14px; }

  /* ---------- gradient page header (Heute / Gruppen / Captains) ---------- */
  .view-title{
    position:static; margin:6px 2px 20px; padding:0;

  .kat-sw span{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .18s}

  .g-b.good{background:var(--accent-wash);color:var(--accent-ink)}

  .pb-row span{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink-2)}
  .pb-ic{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2}

  .lg-chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .lg-chip.add{padding:7px 11px;display:flex;align-items:center}

/* ====================================================================
   CAPTAIN LEAGUE 2.0 — finale, vereinheitlichte Design-Schicht
   Konsolidiert alle früheren Skins; diese Schicht gewinnt die Kaskade.
   System: EIN Hero-Gradient · EIN Eyebrow-Rezept · Accent = aktiv/live
   ==================================================================== */

/* Qualitäts-Boden */
*{-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior-y:none}
::selection{background:var(--accent-wash);color:var(--ink)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001s!important;animation-iteration-count:1!important;transition-duration:.001s!important}}

/* Eyebrow-Rezept — überall identisch */
.lbl,.dh-k,.cd .k,.cd .dh-k,.ss-k,.codecard .k,.ob-tag{font-family:var(--fd);font-weight:600;letter-spacing:.09em;text-transform:uppercase}
.lbl{font-size:13px;color:var(--ink-3)}
.dh-k{font-size:13px}
.ss-k,.cd .k,.cd .dh-k,.codecard .k{font-size:12px}
.gt-h{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}

/* Header */
.hd{padding:13px 18px 11px}
.hd-logo{height:28px}
.gear{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;color:var(--ink-2);transition:transform .12s ease,background .15s ease}
.gear:active{transform:scale(.94);background:var(--field)}
.gear svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.hd-pts{background:var(--accent-grad);box-shadow:0 8px 18px -10px rgba(178,58,31,.6);transition:transform .12s ease}
.hd-pts:active{transform:scale(.96)}
.hd-pts svg{stroke:#fff}

/* Bottom-Navigation — App-Gefühl */
.tabs{background:color-mix(in srgb,var(--card) 94%,transparent);backdrop-filter:blur(14px) saturate(1.3);-webkit-backdrop-filter:blur(14px) saturate(1.3);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
.tab{position:relative;color:var(--ink-3);font-weight:700;border-radius:var(--r-sm);transition:color .15s ease}
.tab span{font-size:10.5px;letter-spacing:.01em}
.tab svg{stroke-width:1.9;transition:stroke-width .15s ease}
.tab.on{color:var(--accent)}
.tab.on svg{stroke-width:2.3}
.tab.on::before{content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:99px;background:var(--accent)}

/* EIN Hero-Gradient für alle dunklen Flächen */
.day-hero,.day-hero.pre,.cd,.stand-strip,.codecard,.ob-top{background:var(--grad-hero)}
.day-hero{border:0;border-radius:var(--r-lg);padding:18px 16px 16px;margin:2px 0 16px;color:#fff;box-shadow:0 18px 38px -24px rgba(20,15,12,.55)}
.day-hero .dh-k,.day-hero.pre .dh-k{color:rgba(255,255,255,.78)}
.day-hero .dh-big,.cd .dh-big{color:#fff}
.dh-big{font-size:34px;font-weight:800}
.day-hero .dh-sub{color:rgba(255,255,255,.66)}
.cd{border-radius:var(--r-lg);color:#fff}
.view-title{font-size:30px;font-weight:800}

/* Karten & Tabellen */
.match{border-radius:var(--r-lg);padding:16px}
.m-meta{font-size:12px}
.gt-r.q{box-shadow:inset 3px 0 0 var(--accent)}

/* Badges — ein System, Live mit Puls */
.m-badge{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;display:inline-flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums}
.m-badge.live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);animation:clPulse 1.5s ease-in-out infinite}
.mb-live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent-ink)}
.mb-live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);animation:clPulse 1.5s ease-in-out infinite}
@keyframes clPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.75)}}

/* Eingaben */
.si{width:44px;height:52px;font-size:27px;background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-sm)}
.si:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-wash)}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-wash)}

/* Buttons */
.btn{min-height:50px;font-weight:700;transition:transform .12s ease,box-shadow .15s ease,background .15s ease}
.btn:active{transform:scale(.985)}
.btn-pri{background:var(--accent-grad);box-shadow:0 12px 24px -14px rgba(178,58,31,.55)}
.btn-pri:active{background:var(--accent-press);box-shadow:0 6px 12px -8px rgba(178,58,31,.5)}
.btn-sm{min-height:42px}

/* Sheets, Toast, Scrim, Empty */
.sheet{border-radius:26px 26px 0 0}
.grip{width:40px;height:4px;border-radius:99px;background:var(--line);margin:10px auto 8px}
.toast{border-radius:var(--pill);font-weight:700;box-shadow:0 16px 34px -16px rgba(28,26,23,.45)}
.scrim{background:rgba(22,17,14,.45);backdrop-filter:blur(2px)}
.empty-ic{width:54px;height:54px;border-radius:50%;background:var(--accent-wash);display:grid;place-items:center;margin:0 auto 14px}

/* Onboarding: Logo auf dunklem Hero sichtbar (Weiss-Variante per Filter) */
.ob-logo-img{filter:invert(1) brightness(1.15)}
.ob-top::after{height:4px;background:var(--accent-grad)}

/* Zahlen überall tabellarisch */
.lb-pts,.lb-rank,.m-pt,.tile .n,.mb-tot .n,.gt-r,.hd-pts .v{font-variant-numeric:tabular-nums}


/* Rechtliches: Hinweis-Bar + Link-Buttons */
.linkish{background:none;border:0;padding:0;margin:0;color:var(--ink-2);text-decoration:underline;font:inherit;font-size:inherit;cursor:pointer}
.cl-note{position:fixed;left:12px;right:12px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:35;background:var(--ink);color:#fff;border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 16px 34px -16px rgba(0,0,0,.5);animation:rise .35s ease}
.cl-note-t{font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.92)}
.cl-note-ok{flex:0 0 auto;background:var(--accent-grad);color:#fff;border:0;border-radius:var(--pill);font-weight:800;font-size:13px;padding:9px 16px;cursor:pointer;font-family:inherit}
.legal p{font-size:13.5px;line-height:1.6;color:var(--ink-2);margin:0 0 10px}
.pick-n{flex:0 0 auto;font-family:var(--fd);font-weight:700;font-size:12px;letter-spacing:.04em;color:var(--accent-ink);background:var(--accent-wash);border-radius:var(--pill);padding:4px 9px}
.am-stars.miss{color:var(--accent-ink);font-weight:800}
</style>

const SUPABASE = { url:'https://xjythzzkzjxyvhoctnyh.supabase.co', anonKey:'sb_publishable_Ep8m-ecGV5qvnrdUgdLelA_r8qWmo01' };

const EMPTY_DB=()=>({me:null,fixtures:[],preds:{},results:{},trio:{},stars:{},league:null,leagues:[],special:{},refPts:0});
function initCloud(){ try{ if(SUPABASE.url&&SUPABASE.anonKey&&window.supabase){ sb=window.supabase.createClient(SUPABASE.url,SUPABASE.anonKey,{auth:{persistSession:true,autoRefreshToken:true,storageKey:'golazo-auth'}}); CLOUD=true; } }catch(e){ console.warn('cloud init',e); CLOUD=false; } }
function fxList(){ return FIX.map(f=>({id:f.id,md:f.md,g:f.g,home:f.h,away:f.a,ko:f.ko,v:f.v})); }
function ensureFixtures(){ if(!DB.fixtures||!DB.fixtures.length){ DB.fixtures=fxList(); } }
async function loadPicksCloud(){ if(!(CLOUD&&USER&&sb))return; try{ const [{data:tp},{data:st}]=await Promise.all([sb.from('cl_tips').select('fixture_id,h,a'),sb.from('cl_stars').select('fixture_id,player_id')]); if(tp){ DB.preds={}; tp.forEach(r=>{DB.preds[r.fixture_id]={h:r.h,a:r.a};}); } if(st){ DB.stars={}; st.forEach(r=>{DB.stars[r.fixture_id]=r.player_id;}); } }catch(e){ console.warn('picks',e); } }
async function loadResultsCloud(FX){
  DB.results={};
  try{ const {data:res}=await sb.from('results').select('match,h,a'); const by={}; (res||[]).forEach(r=>{by[r.match]={h:r.h,a:r.a};}); FX.forEach(f=>{const r=by[f.home+'-'+f.away]; if(r&&r.h!=null&&r.a!=null)DB.results[f.id]={h:r.h,a:r.a};}); KO_FIX.forEach(k=>{const rr=by['ko'+k.id]; if(rr&&rr.h!=null&&rr.a!=null)DB.results[k.id]={h:rr.h,a:rr.a};}); }catch(e){ console.warn('results',e); }
  try{ const {data:perf}=await sb.from('performances').select('*'); PERF={}; (perf||[]).forEach(r=>{ (PERF[r.match]=PERF[r.match]||{})[r.player]={m:r.m||0,g:r.g||0,a:r.a||0,y:r.y||0,r:r.r||0}; }); }catch(e){ console.warn('perf',e); }
  try{ const {data:ks}=await sb.from('ko_state').select('k,v'); KO_SEEDS={};KO_ADV={};KO_UNLOCKED=false;KO_CHAMP=null; (ks||[]).forEach(row=>{ if(row.k==='seeds'){try{KO_SEEDS=JSON.parse(row.v)||{};}catch(_e){}} else if(row.k==='adv'){try{KO_ADV=JSON.parse(row.v)||{};}catch(_e){}} else if(row.k==='unlocked'){KO_UNLOCKED=row.v==='1';} else if(row.k==='champion'){KO_CHAMP=row.v||null;} }); }catch(e){ console.warn('ko_state',e); }
}
async function loadCloud(FX){
  DB=EMPTY_DB(); DB.fixtures=FX;
  try{ const {data:st}=await sb.from('user_state').select('*').eq('user_id',USER.id).maybeSingle();
    DB.banned=!!(st&&st.banned);
    if(st&&st.state){const s=st.state; DB.me=s.me||null; DB.preds=s.preds||{}; DB.stars=s.stars||{}; DB.trio=s.trio||{}; DB.leagues=s.leagues||(s.league?[s.league]:[]); DB.league=DB.leagues.find(l=>l.code===s.activeLeague)||DB.leagues[0]||null; DB.fxOn=s.fxOn; DB.special=s.special||{}; DB.refPts=s.refPts||0;} }catch(e){ console.warn('state',e); }
  await loadResultsCloud(FX);
  if(DB.league&&DB.league.code){ try{ const {data:rows}=await sb.rpc('league_board',{p_code:DB.league.code}); if(rows&&rows.length)DB.league.members=rows.map(r=>r.uname||'Spieler'); }catch(e){ console.warn('members',e); } }
  DB.fixtures=FX;
}
function tipPointsForState(s){let pts=0;DB.fixtures.forEach(f=>{const v=scorePred((s.preds||{})[f.id],DB.results[f.id]); if(v!=null)pts+=v;});return pts+koTipPts(s.preds);}
function memberStarPts(f,p,r){const perf=perfFor(f,p);if(!perf)return null;const mn=perf.m===2?2:(perf.m===1?1:0),gp=(p.pos==='GK'||p.pos==='DEF')?6:(p.pos==='MID'?5:4);let cs=0;if(perf.m===2&&r&&r.h!=null){const conc=(f.home===p.team?r.a:r.h);if(conc===0)cs=(p.pos==='GK'||p.pos==='DEF')?4:(p.pos==='MID'?1:0);}return mn+(perf.g||0)*gp+(perf.a||0)*3+cs-(perf.y||0)-(perf.r||0)*3;}
function starPointsForState(s){let pts=0;DB.fixtures.forEach(f=>{const pid=(s.stars||{})[f.id]; if(!pid)return; const p=pl(pid); if(!p)return; const v=memberStarPts(f,p,DB.results[f.id]); if(v!=null)pts+=v;});return pts;}
function pointsForState(s){return tipPointsForState(s)+starPointsForState(s)+specialPointsForState(s)+((s&&s.refPts)||0);}
async function ensureMembership(){
  S.memErr=null;
  if(!CLOUD||!USER)return;
  const lgs=(DB.leagues&&DB.leagues.length)?DB.leagues:(DB.league?[DB.league]:[]);
  for(const lg of lgs){
    if(!lg||!lg.code)continue;
    try{
      const {error}=await sb.rpc('ensure_league',{p_code:lg.code,p_league_name:(lg.name||'Liga'),p_name:(DB.me&&DB.me.name)||'Spieler'});
      if(error){ S.memErr='Reparatur fehlgeschlagen: '+(error.message||error.code||JSON.stringify(error)); console.warn('ensureMembership',error); }
    }catch(e){ S.memErr='Reparatur-Ausnahme: '+(e&&e.message||String(e)); console.warn('ensureMembership',e); }
  }
}
async function fetchLeaderboard(){
  S.lbErr=null;
  if(!CLOUD||!DB.league||!DB.league.code){S.lbData=null;S.lbErr='Kein Cloud-Modus oder keine Liga aktiv.';return;}
  try{
    const {data:rows,error}=await sb.rpc('league_board',{p_code:DB.league.code});
    if(error){ console.warn('board',error); S.lbData=null; S.lbErr='RPC-Fehler: '+(error.message||error.code||JSON.stringify(error)); return; }
    const list=rows||[];
    if(list.length){ DB.league.members=list.map(r=>r.uname||'Spieler'); }
    S.lbData=list.map(r=>{const sObj=r.ustate||{};
      return {id:r.uid,n:r.uname||'Spieler',fav:r.fav||(sObj.me&&sObj.me.fav)||'',pts:(r.total||0),tip:(r.tip||0),star:(r.star||0),st:sObj,me:r.uid===USER.id};})
      .sort((a,b)=>b.pts-a.pts||(b.tip||0)-(a.tip||0)||a.n.localeCompare(b.n));
  }catch(e){ console.warn('leaderboard',e); S.lbData=null; S.lbErr='Ausnahme: '+(e&&e.message||String(e)); }
}
function reloadLb(){ if(!CLOUD)return; toast('Aktualisiere…'); ensureMembership().then(fetchLeaderboard).then(render); }
function openMember(id){
  if(!S.lbData)return; const m=S.lbData.find(x=>x.id===id); if(!m)return;
  const st=m.st||{}, preds=st.preds||{}, stars=st.stars||{}, now=Date.now();
  const fx=DB.fixtures.slice().sort((a,b)=>new Date(a.ko)-new Date(b.ko));
  let tipRows='', shown=0, hidden=0;
  fx.forEach(f=>{ const kicked=tipClosed(f.id); const pr=preds[f.id];
    if(!kicked){ if(pr&&pr.h!=null)hidden++; return; }
    if(!pr||pr.h==null)return; shown++;
    const r=DB.results[f.id], pts=scorePred(pr,r), cls=pts===5?'p5':pts===2?'p2':'p0';
    tipRows+=`<div class="mb-row"><div class="mb-mt">${fi(f.home)} ${esc(T(f.home).n)} <span class="mb-sc">${pr.h}:${pr.a}</span> ${esc(T(f.away).n)} ${fi(f.away)}</div>${r&&r.h!=null?`<span class="m-pt ${cls}">${pts>0?'+'+pts:'0'}</span>`:`<span class="mb-live">läuft</span>`}</div>`; });
  let starRows='';
  fx.forEach(f=>{ if(!tipClosed(f.id))return; const pid=stars[f.id]; if(!pid)return; const pp=pl(pid); if(!pp)return;
    const sp=memberStarPts(f,pp,DB.results[f.id]);
    starRows+=`<div class="mb-star">${fi(pp.team)}<div class="nm">${esc(pp.name)} <span style="color:var(--ink-3);font-weight:600">· ${esc(T(f.home).n)}–${esc(T(f.away).n)}</span></div>${sp!=null?`<span class="pt">+${sp}</span>`:`<span class="mb-live">offen</span>`}</div>`; });
  sheetRaw(`<div class="sheet-hd"><div class="grip"></div><h2>${esc(m.n)}</h2><div class="ss">${m.me?'Das bist du':'Mitglied deiner Liga'}</div></div>
    <div class="sheet-bd">
      <div class="mb-tot"><div class="t"><div class="n acc">${m.pts}</div><div class="l">Total</div></div><div class="t"><div class="n">${m.tip}</div><div class="l">Tipps</div></div><div class="t"><div class="n">${m.star}</div><div class="l">Captains</div></div></div>
      <div class="mb-sec">Tipps</div>
      ${shown?tipRows:`<div class="mb-note">${svg(I.clock)} Noch keine Tipps für angepfiffene Spiele.</div>`}
      ${hidden?`<div class="mb-note">${svg(I.clock)} ${hidden} ${hidden===1?'Tipp ist':'Tipps sind'} für kommende Spiele bis zum Anpfiff verborgen — fair bleibt fair.</div>`:''}
      ${starRows?`<div class="mb-sec">Captains</div>${starRows}`:''}
      <button class="btn btn-soft btn-wide btn-sm" style="margin-top:14px" onclick="closeSheet()">Schließen</button>
    </div>`);
}

function userToEmail(u){ return (u||'').toLowerCase().replace(/[^a-z0-9_]/g,'') + '@golazo.app'; }
function usernameAllowed(u){
  const t=(u||'').toLowerCase().trim();
  if(!/^[a-z][a-z0-9_]{2,19}$/.test(t)) return {ok:false,msg:'3–20 Zeichen, beginnt mit einem Buchstaben, nur a–z, 0–9 und _.'};
  const n=normName(t); for(const w of NAME_BLOCK){ if(n.includes(w)) return {ok:false,msg:'Dieser Benutzername ist nicht erlaubt.'}; }
  return {ok:true,clean:t};
}

function authErr(m){const e=$('#au-err'); if(e){e.textContent=m||''; e.style.display=m?'block':'none';}}
function authMsg(m){ m=(m||'').toLowerCase();
  if(m.includes('rate limit'))return 'Zu viele Versuche. Warte 1–2 Minuten und probier es nochmal.';
  if(m.includes('already registered')||m.includes('already been registered'))return 'Dieser Benutzername ist schon vergeben — wähl einen anderen.';
  if(m.includes('invalid login')||m.includes('invalid credentials'))return 'Benutzername oder Passwort stimmt nicht.';
  if(m.includes('password'))return 'Passwort: mindestens 8 Zeichen.';
  return m?m.charAt(0).toUpperCase()+m.slice(1):'Etwas ist schiefgelaufen — bitte nochmal versuchen.'; }
async function doSignup(){
  const name=($('#au-name').value||'').trim(), uraw=($('#au-user').value||'').trim(), pw=$('#au-pw').value||'';
  const dn=nameAllowed(name); if(!dn.ok)return authErr(dn.msg);
  try{ const {data:taken}=await sb.rpc('cl_name_taken',{p_name:name}); if(taken)return authErr('Name schon vergeben — bitte einen anderen wählen.'); }catch(e){ console.warn('nametaken',e); }
  const un=usernameAllowed(uraw); if(!un.ok)return authErr(un.msg);
  if(pw.length<8)return authErr('Passwort: mindestens 8 Zeichen.');
  authErr('…');
  const email=userToEmail(un.clean);
  let r; try{ r=await sb.auth.signUp({email,password:pw,options:{data:{username:un.clean,display_name:name}}}); }catch(e){ return authErr('Keine Verbindung — Internet prüfen und nochmal.'); }
  if(r.error)return authErr(authMsg(r.error.message));
  if(r.data&&r.data.user&&r.data.user.identities&&r.data.user.identities.length===0)return authErr('Dieser Benutzername ist schon vergeben — wähl einen anderen.');
  let sess=r.data&&r.data.session;
  if(!sess){ let l; try{ l=await sb.auth.signInWithPassword({email,password:pw}); }catch(e){ l={}; } sess=l&&l.data&&l.data.session; }
  if(!sess)return authErr('Konto angelegt. Tippe oben auf „Anmelden".');
  USER=sess.user; applyRemember();
  DB.me={name,username:un.clean,fav:'',tz:detectTz(),role:'member'};
  await persist();
  enterMain(); setTimeout(openGuide,500);
}
async function doLogin(){
  const uraw=($('#au-user').value||'').trim(), pw=$('#au-pw').value||'';
  if(!uraw||!pw)return authErr('Benutzername und Passwort eingeben.');
  authErr('…');
  const email = uraw.includes('@') ? uraw.toLowerCase() : userToEmail(uraw);
  let r; try{ r=await sb.auth.signInWithPassword({email,password:pw}); }catch(e){ return authErr('Keine Verbindung — Internet prüfen und nochmal.'); }
  if(r.error)return authErr(authMsg(r.error.message));
  USER=r.data.session.user; applyRemember(); await afterAuth();
}
async function afterAuth(){ const FX=fxList(); await loadCloud(FX); await loadPicksCloud(); await loadReferrals(); await loadAdminFlag(); if(DB.banned){renderBanned();return;} if(!DB.me||!DB.me.name){ renderOnboard('welcome'); return;} if(DB.leagues&&DB.leagues.length)await ensureMembership(); enterMain(); }

function _koCompute(id,slot){
  const kf=KO_BY_ID[id]; if(!kf)return null;
  const code=slot==='A'?kf.a:kf.b;
  if(code[0]==='W'||code[0]==='L'){ const ref=parseInt(code.slice(1),10); const w=koWinLose(ref); if(!w)return null; return code[0]==='W'?w.win:w.lose; }
  const sd=KO_SEEDS[id]; if(!sd)return null; return (slot==='A'?sd.a:sd.b)||null;
}
function koWinLose(id){
  const ta=koTeam(id,'A'), tb=koTeam(id,'B'); if(!ta||!tb)return null;
  const r=DB.results[id]; if(!r||r.h==null||r.a==null)return null;
  if(r.h>r.a)return {win:ta,lose:tb}; if(r.a>r.h)return {win:tb,lose:ta};
  const adv=KO_ADV[id]; if(adv==='A')return {win:ta,lose:tb}; if(adv==='B')return {win:tb,lose:ta}; return null;
}

async function doCreate(){
  const lg=($('#ob-league').value||'').trim();
  const name=(DB.me&&DB.me.name)||''; if(!name)return toast('Bitte zuerst registrieren.');
  if(!lg)return toast('Liga-Name fehlt');
  if((DB.leagues||[]).length>=3)return toast('Maximal 3 Ligen — verlasse zuerst eine.');
  const _cl=nameAllowed(lg); if(!_cl.ok)return toast('Liga-Name nicht erlaubt — bitte anders benennen.');
  const fav=($('#ob-fav')||{}).value||(DB.me&&DB.me.fav)||'', tz=(DB.me&&DB.me.tz)||detectTz();
  const _ch=($('#ob-champ')||{}).value||''; if(_ch){DB.special=DB.special||{};DB.special.champ=_ch;}
  if(CLOUD){
    let code=genCode(), made=false;
    for(let i=0;i<10;i++){ const {error}=await sb.rpc('create_league',{p_code:code,p_name:lg,p_owner_name:name}); if(!error){made=true;break;} console.warn('create try',error); code=genCode(); }
    if(!made)return toast('Konnte Liga nicht erstellen — nochmal versuchen');
    DB.me=Object.assign({},DB.me,{name,fav,tz,role:'admin'}); _addLeague({name:lg,code,role:'admin',members:[name]});
    await persist(); renderOnboard('created'); return;
  }
  const reg=await leaguesReg(); let code=genCode(),guard=0; while(reg[code]&&guard++<60)code=genCode();
  reg[code]={name:lg,owner:name,members:[name],created:Date.now()};
  await sset('wm26:leagues',reg);
  DB.me=Object.assign({},DB.me,{name,fav,tz,role:'admin'});
  _addLeague({name:lg,code,role:'admin',members:[name]});
  await persist(); renderOnboard('created');
}
async function doJoin(){
  const code=($('#ob-code').value||'').trim().toUpperCase();
  const name=(DB.me&&DB.me.name)||''; if(!name)return toast('Bitte zuerst registrieren.');
  if(code.length<4)return toast('Code zu kurz');
  const _exist=(DB.leagues||[]).find(l=>l.code===code); if(_exist){ DB.league=_exist; S.lbData=null; await persist(); enterApp(); return; }
  if((DB.leagues||[]).length>=3)return toast('Maximal 3 Ligen — verlasse zuerst eine.');
  const fav=($('#ob-fav')||{}).value||(DB.me&&DB.me.fav)||'', tz=(DB.me&&DB.me.tz)||detectTz();
  const _ch=($('#ob-champ')||{}).value||''; if(_ch){DB.special=DB.special||{};DB.special.champ=_ch;}
  if(CLOUD){
    const {error:je}=await sb.rpc('join_league',{p_code:code,p_name:name});
    if(je){ const mm=(je.message||'').toLowerCase(); if(mm.includes('not found'))return toast('Diese Liga gibt es nicht — prüfe den Code.'); console.warn('join',je); return toast('Konnte nicht beitreten: '+(je.message||je.code||'Fehler')); }
    let lname='Liga '+code; try{ const {data:lg}=await sb.from('leagues').select('name').eq('code',code).maybeSingle(); if(lg&&lg.name)lname=lg.name; }catch(e){}
    DB.me=Object.assign({},DB.me,{name,fav,tz,role:'member'}); _addLeague({name:lname,code,role:'member',members:[name]});
    await persist();
    if(PENDING_REF){ try{ await sb.rpc('record_referral',{p_referrer:PENDING_REF,p_code:code}); }catch(e){console.warn('ref',e);} PENDING_REF=null; }
    enterApp(); return;
  }
  const reg=await leaguesReg(); const lg=reg[code];
  if(!lg)return toast('Diese Liga gibt es nicht — prüfe den Code.');
  if(!lg.members.includes(name)){lg.members.push(name);await sset('wm26:leagues',reg);}
  DB.me=Object.assign({},DB.me,{name,fav,tz,role:'member'});
  _addLeague({name:lg.name,code,role:'member',members:lg.members.slice()});
  await persist(); enterApp();
}

/* ---------- scoring ---------- */
function scorePred(p,r){if(!r||!p||p.h==null||p.a==null)return null;if(p.h===r.h&&p.a===r.a)return 5;const a=Math.sign(p.h-p.a),b=Math.sign(r.h-r.a);return a===b?2:0;}
function myTipPoints(){let s=0;DB.fixtures.forEach(f=>{const v=scorePred(DB.preds[f.id],DB.results[f.id]);if(v!=null)s+=v;});return s+koTipPts(DB.preds);}
function starGoalPts(pos){return (pos==='GK'||pos==='DEF')?6:(pos==='MID'?5:4);}
function matchKey(f){return f.home+'-'+f.away;}
function perfFor(f,p){ if(!f||!p)return null; const blk=PERF[matchKey(f)]; if(!blk)return null; return blk[p.name]||blk[lastName(p.name)]||null; }
function starBreakdown(fid){
  const pid=DB.stars[fid]; if(!pid)return null; const p=pl(pid); if(!p)return null;
  const f=DB.fixtures.find(x=>x.id===fid); if(!f)return null;
  const perf=perfFor(f,p); if(!perf)return null;
  const min=perf.m===2?2:(perf.m===1?1:0);
  const goals=(perf.g||0)*starGoalPts(p.pos);
  const assists=(perf.a||0)*3;
  let cs=0; const r=DB.results[fid];
  if(perf.m===2&&r&&r.h!=null){const conc=(f.home===p.team?r.a:r.h);if(conc===0)cs=(p.pos==='GK'||p.pos==='DEF')?4:(p.pos==='MID'?1:0);}
  const cards=-(perf.y||0)-(perf.r||0)*3;
  return {min,goals,assists,cs,cards,total:min+goals+assists+cs+cards};
}
function starPoints(fid){const b=starBreakdown(fid);return b?b.total:null;}
function myStarPoints(){let s=0;DB.fixtures.forEach(f=>{const v=starPoints(f.id);if(v!=null)s+=v;});return s;}
function totalPoints(){return myTipPoints()+myStarPoints()+mySpecialPoints()+(DB.refPts||0);}

}

function scorerTable(){
  const acc={};
  Object.values(PERF).forEach(blk=>{ Object.entries(blk).forEach(([name,pf])=>{ const x=acc[name]=acc[name]||{g:0,a:0}; x.g+=pf.g||0; x.a+=pf.a||0; }); });
  return Object.entries(acc).map(([name,v])=>{ const p=PLAYERS.find(pp=>pp.name===name||lastName(pp.name)===name); return {name:(p?p.name:name),team:p?p.team:null,pos:p?p.pos:null,g:v.g,a:v.a}; })
    .filter(x=>x.g>0||x.a>0);
}
function tournamentFinished(){ return DB.fixtures.length>0 && DB.fixtures.every(f=>DB.results[f.id]!=null); }
function firstKickoff(){ let m=Infinity; DB.fixtures.forEach(f=>{const t=new Date(f.ko).getTime(); if(t<m)m=t;}); return m; }

function specialPointsForState(s){
  const sp=(s&&s.special)||{};
  let champPts=0;
  if(sp.champ&&KO_CHAMP&&sp.champ===KO_CHAMP)champPts=20;
  if(!tournamentFinished())return champPts;
  if(!sp.scorer&&!sp.assist)return champPts;
  const tbl=scorerTable(); if(!tbl.length)return champPts;
  const maxG=Math.max(0,...tbl.map(x=>x.g)), maxA=Math.max(0,...tbl.map(x=>x.a));
  let pts=0;
  if(sp.scorer){ const p=pl(sp.scorer); const row=p&&tbl.find(x=>x.name===p.name); if(row&&maxG>0&&row.g===maxG)pts+=15; }
  if(sp.assist){ const p=pl(sp.assist); const row=p&&tbl.find(x=>x.name===p.name); if(row&&maxA>0&&row.a===maxA)pts+=15; }
  return pts+champPts;
}

async function fetchGlobalBoard(){
  S.gbErr=null;
  if(!CLOUD){ S.gbData=null; S.gbErr='Nur im Online-Modus.'; return; }
  try{
    const {data:rows,error}=await sb.rpc('global_board');
    if(error){ console.warn('global',error); S.gbData=null; S.gbErr='RPC-Fehler: '+(error.message||error.code||'?'); return; }
    const list=rows||[];
    S.gbData=list.map(r=>({id:r.uid,n:r.uname||'Spieler',fav:r.fav||'',pts:(r.total||0),tip:(r.tip||0),star:(r.star||0),me:!!(USER&&r.uid===USER.id)}))
      .sort((a,b)=>b.pts-a.pts||(b.tip||0)-(a.tip||0)||a.n.localeCompare(b.n));
  }catch(e){ console.warn('global',e); S.gbData=null; S.gbErr='Ausnahme: '+(e&&e.message||String(e)); }
}
function reloadGb(){ if(!CLOUD)return; toast('Aktualisiere…'); fetchGlobalBoard().then(render); }
function viewWelt(){
  if(!CLOUD){
    return `<div class="view-title">Welt-Rangliste<div class="vt-sub">Nur im Online-Modus</div></div>
      <div class="adm-note">${svg(I.clock)} Die globale Rangliste gibt es nur in der online-deployten App mit Konto.</div>`;
  }
  let rows='', cnt=0, myRank=null, note='';
  if(S.gbData){
    cnt=S.gbData.length;
    const mi=S.gbData.findIndex(p=>p.me); myRank=mi>=0?mi+1:null;
    S.gbData.forEach((p,i)=>{ rows+=lbRow(p,i+1,false); });

  } else {
    note=`<p class="note" style="text-align:center;margin-top:12px">Lade Welt-Rangliste…</p>`;
  }
  const sub = myRank?`Dein Platz: ${myRank} von ${cnt}`:(cnt?`${cnt} Spieler weltweit`:'Alle Captain-League-Spieler');
  let html=`<div class="view-title">Welt-Rangliste<div class="vt-sub">${sub}</div></div>`;

  html+=note;

  html+=`<p class="note" style="text-align:center;margin-top:14px">Hier erscheint jeder, der ein Captain-League-Konto hat — über alle Ligen hinweg.</p>`;
  return html;
}

}
function koAdminMatch(id){ S.koMid=id; const r=DB.results[id]; S.koScore=r?{h:r.h,a:r.a}:{h:0,a:0}; S.koAdv=KO_ADV[id]||null; renderKoAdminMatch(); }
function koScoreStep(side,d){ S.koScore[side]=Math.max(0,Math.min(30,(S.koScore[side]||0)+d)); const el=$('#ks-'+side); if(el)el.textContent=S.koScore[side]; const w=$('#ko-adv-wrap'); if(w)w.style.display=(S.koScore.h===S.koScore.a)?'block':'none'; }
function koSetAdv(x){ S.koAdv=x; const seg=$('#ko-adv-seg'); if(seg)[...seg.children].forEach(b=>b.classList.toggle('on',b.dataset.s===x)); }
function renderKoAdminMatch(){
  koResolve();
  const id=S.koMid, kf=KO_BY_ID[id]; if(!kf)return;
  const ta=koTeam(id,'A'), tb=koTeam(id,'B');
  const an=ta?esc(T(ta).n):koLabel(kf.a), bn=tb?esc(T(tb).n):koLabel(kf.b);
  const sc=S.koScore||{h:0,a:0}, hasRes=DB.results[id]!=null, draw=sc.h===sc.a;
  const step=(side)=>`<div class="as-step"><button class="stp" onclick="koScoreStep('${side}',-1)">−</button><div class="as-val" id="ks-${side}">${sc[side]||0}</div><button class="stp" onclick="koScoreStep('${side}',1)">+</button></div>`;
  const adv=`<div id="ko-adv-wrap" style="display:${draw?'block':'none'}"><div class="adm-h" style="margin-top:16px">Wer kommt weiter?</div><div class="seg-pos" id="ko-adv-seg"><button data-s="A" class="${S.koAdv==='A'?'on':''}" onclick="koSetAdv('A')">${an}</button><button data-s="B" class="${S.koAdv==='B'?'on':''}" onclick="koSetAdv('B')">${bn}</button></div><p class="note" style="margin:5px 2px 0">Bei Remis nach 90 Min (Verlängerung/Elfmeter): bestimmt, wer im Turnierbaum weiterkommt. Gewertet wird der 90-Minuten-Stand (5/2/0).</p></div>`;
  sheetRaw(`<div class="sheet-hd"><div class="grip"></div><h2 style="margin:0">${an} – ${bn}</h2><div class="ss">${kf.round} · ${koDayLong(kf.ko)} · ${koTime(kf.ko)}</div></div>
    <div class="sheet-bd">
      <div class="adm-h">Ergebnis (90 Min)</div>
      <div class="adm-score">
        <div class="as-side"><span class="as-nm">${an}</span></div>
        ${step('h')}<span class="as-x">:</span>${step('a')}
        <div class="as-side r"><span class="as-nm">${bn}</span></div>
      </div>
      ${adv}
      <div class="adm-btns" style="margin-top:16px">
        <button class="btn btn-pri" onclick="koCommitScore()">${svg(I.check)} Speichern</button>
        <button class="btn btn-out${hasRes?'':' off'}" onclick="koClearScore()">${svg(I.x)} Austragen</button>
      </div>
      <button class="btn btn-soft btn-wide btn-sm" style="margin-top:16px" onclick="renderKoAdmin()">${svg(I.chevL)} Zurück</button>
    </div>`);
}
async function koCommitScore(){
  const id=S.koMid, h=S.koScore.h||0, a=S.koScore.a||0;
  if(h===a&&!S.koAdv)return toast('Bei Remis: bitte wählen, wer weiterkommt');
  if(CLOUD&&sb){ try{ const {error}=await sb.rpc('admin_set_result',{p_match:'ko'+id,p_h:h,p_a:a}); if(error){toast('Fehler: '+(error.message||error.code||'?'));return;} }catch(e){toast('Speichern fehlgeschlagen');console.warn(e);return;} }
  DB.results[id]={h,a};
  const adv=Object.assign({},KO_ADV); if(h===a){adv[id]=S.koAdv;}else{delete adv[id];}
  if(!(await koSet('adv',JSON.stringify(adv))))return;
  KO_ADV=adv;
  if(id===104){ const w=koWinLose(104); const code=(w&&w.win)||''; if(CLOUD&&sb){ try{ await sb.rpc('admin_ko_set',{p_key:'champion',p_val:code}); }catch(e){ console.warn('champ',e); } } KO_CHAMP=code||null; }
  toast(h+':'+a+' gespeichert ✓'); refreshAfterAdmin(); renderKoAdmin();
}
async function koClearScore(){
  const id=S.koMid;
  if(CLOUD&&sb){ try{ await sb.rpc('admin_del_result',{p_match:'ko'+id}); }catch(e){console.warn(e);} }
  delete DB.results[id]; S.koScore={h:0,a:0}; S.koAdv=null;
  const adv=Object.assign({},KO_ADV); delete adv[id]; await koSet('adv',JSON.stringify(adv)); KO_ADV=adv;
  toast('Ergebnis ausgetragen'); refreshAfterAdmin(); renderKoAdmin();
}
/* ============================================================ ADMIN — Nutzer & Moderation ============================================================ */
function renderBanned(){
  app().innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 26px;text-align:center">
    <div><div style="font-family:var(--fd);font-weight:900;font-size:27px;color:var(--ink)">Account gesperrt</div>
    <p style="color:var(--ink-2);margin-top:12px;line-height:1.55;max-width:300px">Dein Zugang zu Captain League wurde gesperrt. Wende dich an den Betreiber deiner Liga, wenn du denkst, das sei ein Fehler.</p></div></div>`;
}
async function adminFetchUsers(){
  if(!CLOUD||!sb){ S.admUsers=[]; S.admUsersErr='Nur im Online-Modus.'; return; }
  try{ const {data,error}=await sb.rpc('admin_all_users');
    if(error){ S.admUsers=[]; S.admUsersErr='RPC-Fehler: '+(error.message||error.code||'?'); return; }
    S.admUsers=(data||[]).map(u=>({uid:u.uid,uname:u.uname,email:u.email||'',username:(u.state&&u.state.me&&u.state.me.username)||'',fav:u.fav,banned:u.banned,state:u.state||{}}))
      .sort((a,b)=>pointsForState(b.state)-pointsForState(a.state)); S.admUsersErr=null;
  }catch(e){ S.admUsers=[]; S.admUsersErr='Ausnahme: '+String(e&&e.message||e); }
}
function openAdminUsers(){ S.admUsers=null; S.admUsersErr=null; renderAdminUsers(); adminFetchUsers().then(renderAdminUsers); }
function renderAdminUsers(){
  let body;
  if(S.admUsers==null){ body=`<p class="note" style="text-align:center;margin-top:14px">Lade Nutzer…</p>`; }
  else if(S.admUsersErr){ body=`<div class="adm-note">${svg(I.clock)} ${esc(S.admUsersErr)}</div>`; }
  else if(!S.admUsers.length){ body=`<div class="adm-note">${svg(I.clock)} Keine Nutzer sichtbar. Bist du als Admin registriert? Trage deine User-ID (unten) einmalig in <b>app_admins</b> ein.</div>`; }
  else {
    body=S.admUsers.map(u=>{
      const pts=pointsForState(u.state||{}); const fav=u.state&&u.state.me&&u.state.me.fav;
      const av=fav&&TEAMS[fav]?`<div class="lb-av flag-av" style="width:30px;height:30px">${fi(fav)}</div>`:`<div class="lb-av" style="width:30px;height:30px">${esc((u.uname||'?')[0].toUpperCase())}</div>`;
      return `<button class="am-row" onclick="openAdminUser('${u.uid}')"><div class="am-line">
        <span class="am-tm">${av}<span style="min-width:0;display:flex;flex-direction:column"><span class="am-nm">${esc(u.uname||'Spieler')}${u.banned?' <span class="ban-badge">gesperrt</span>':''}</span>${(u.username||u.email)?`<span class="am-mail">${esc(u.username?('@'+u.username):u.email)}</span>`:''}</span></span>
        <span class="am-res set" style="background:${u.banned?'var(--muted)':'var(--accent)'}">${pts}</span></div></button>`;
    }).join('');
  }
  sheetRaw(`<div class="sheet-hd"><div class="grip"></div><h2>Nutzer & Moderation</h2><div class="ss">${(S.admUsers&&S.admUsers.length)?S.admUsers.length+' Konten':'Tipps ansehen · sperren'}</div></div>
    <div class="sheet-bd">${body}
      <div class="idbox">Deine User-ID (für Admin-Freischaltung):<code>${USER?esc(USER.id):'—'}</code><button class="btn btn-soft btn-sm" style="margin-top:9px" onclick="adminCopyId()">${svg(I.share)} ID kopieren</button></div>
      <button class="btn btn-soft btn-wide btn-sm" style="margin-top:10px" onclick="renderAdminList()">${svg(I.chevL)} Zurück</button>
    </div>`);
}
function openAdminUser(uid){
  const u=(S.admUsers||[]).find(x=>x.uid===uid); if(!u)return;
  const st=u.state||{}, preds=st.preds||{}, stars=st.stars||{};
  let tips='';
  DB.fixtures.forEach(f=>{ const p=preds[f.id]; if(!p||p.h==null||p.a==null)return;
    const sp=stars[f.id]?pl(stars[f.id]):null;
    tips+=`<div class="utip"><span class="utip-m">${fi(f.home)} ${esc(T(f.home).n)} <b>${p.h}:${p.a}</b> ${esc(T(f.away).n)} ${fi(f.away)}</span>${sp?`<span class="utip-s">★ ${esc(lastName(sp.name))}</span>`:''}</div>`;
  });
  if(!tips)tips=`<p class="note">Noch keine Tipps abgegeben.</p>`;
  const sc=st.special&&st.special.scorer?pl(st.special.scorer):null, as=st.special&&st.special.assist?pl(st.special.assist):null;
  const special=(sc||as)?`<div class="adm-h" style="margin-top:18px">Sondertipps</div><div class="utip"><span class="utip-m">${sc?`Torschützenkönig: <b>${esc(sc.name)}</b>`:''}${sc&&as?' · ':''}${as?`Vorlagen: <b>${esc(as.name)}</b>`:''}</span></div>`:'';
  sheetRaw(`<div class="sheet-hd"><div class="grip"></div><h2 style="margin:0">${esc(u.uname||'Spieler')}</h2><div class="ss">${u.username?('@'+esc(u.username)+' · '):(u.email?esc(u.email)+' · ':'')}${pointsForState(st)} Punkte · ${u.banned?'gesperrt':'aktiv'}</div></div>
    <div class="sheet-bd">
      <button class="btn ${u.banned?'btn-pri':'btn-out'} btn-wide" onclick="adminToggleBan('${u.uid}',${u.banned?'false':'true'})">${u.banned?svg(I.check)+' Account entsperren':svg(I.x)+' Account sperren'}</button>
      <div class="adm-h" style="margin-top:18px">Tipps (${Object.keys(preds).length})</div>
      ${tips}
      ${special}
      <button class="btn btn-soft btn-wide btn-sm" style="margin-top:14px" onclick="openAdminUsers()">${svg(I.chevL)} Zurück zur Liste</button>
    </div>`);
}
function adminToggleBan(uid,ban){
  confirmSheet(ban?'Account sperren?':'Account entsperren?',
    ban?'Der Nutzer wird gesperrt, aus allen Ligen entfernt und kann nichts mehr speichern.':'Der Nutzer kann Captain League wieder nutzen (muss Ligen neu beitreten).',
    ban?'Sperren':'Entsperren', async()=>{
      if(CLOUD&&sb){ try{ const {error}=await sb.rpc('admin_set_ban',{p_uid:uid,p_banned:ban}); if(error){toast('Fehler: '+(error.message||error.code||'?'));return;} }catch(e){toast('Fehler beim Sperren');return;} }
      toast(ban?'Account gesperrt':'Account entsperrt'); await adminFetchUsers(); openAdminUsers();
    });
}
function adminCopyId(){ try{ navigator.clipboard.writeText(USER?USER.id:''); toast('User-ID kopiert'); }catch(e){ toast(USER?USER.id:''); } }



/* ---------- sheet ---------- */
function sheetRaw(html){$('#sheet').innerHTML=html;requestAnimationFrame(()=>{$('#scrim').classList.add('open');$('#sheet').classList.add('open');});}
function closeSheet(){const sh=$('#sheet'),sc=$('#scrim');if(!sh)return;sh.classList.remove('open');sc.classList.remove('open');setTimeout(()=>{if($('#sheet'))$('#sheet').innerHTML='';},300);}

boot();
</script>
